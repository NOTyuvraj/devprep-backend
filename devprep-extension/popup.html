<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 320px;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .header {
        background: #1e293b;
        padding: 16px;
        border-bottom: 1px solid #334155;
      }
      .header h1 { font-size: 18px; color: #6366f1; }
      .header p { font-size: 12px; color: #94a3b8; margin-top: 2px; }
      .content { padding: 16px; }
      .problem-info {
        background: #1e293b;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 16px;
      }
      .problem-title {
        font-size: 14px;
        font-weight: bold;
        color: #e2e8f0;
        margin-bottom: 6px;
      }
      .badges { display: flex; gap: 6px; flex-wrap: wrap; }
      .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
      .badge-easy { background: #064e3b; color: #6ee7b7; }
      .badge-medium { background: #451a03; color: #fcd34d; }
      .badge-hard { background: #450a0a; color: #fca5a5; }
      .badge-topic { background: #1e3a5f; color: #93c5fd; }
      .confidence-label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
      .stars { display: flex; gap: 6px; margin-bottom: 16px; }
      .star {
        width: 36px; height: 36px;
        border-radius: 6px;
        background: #1e293b;
        border: 1px solid #334155;
        color: #94a3b8;
        font-size: 18px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s;
      }
      .star:hover, .star.active {
        background: #4f46e5;
        border-color: #6366f1;
        color: white;
      }
      .btn {
        width: 100%;
        padding: 10px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn:hover { background: #4338ca; }
      .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
      .btn-secondary {
        width: 100%;
        padding: 10px;
        background: #1e293b;
        color: #94a3b8;
        border: 1px solid #334155;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
        margin-top: 8px;
      }
      .btn-secondary:hover { background: #334155; }
      .status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
        text-align: center;
        display: none;
      }
      .status.success { background: #064e3b; color: #6ee7b7; display: block; }
      .status.error { background: #450a0a; color: #fca5a5; display: block; }
      .status.info { background: #1e3a5f; color: #93c5fd; display: block; }
      .not-leetcode { padding: 32px 16px; text-align: center; color: #64748b; font-size: 13px; }

      .login-section {
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0;
      }
      .login-icon {
        font-size: 36px;
        margin-bottom: 12px;
      }
      .login-title {
        font-size: 15px;
        font-weight: 600;
        color: #e2e8f0;
        margin-bottom: 6px;
      }
      .login-sub {
        font-size: 12px;
        color: #64748b;
        margin-bottom: 20px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>DevPrep 🧠</h1>
      <p>LeetCode Spaced Repetition Tracker</p>
    </div>

    <!-- LOGIN VIEW — clean, no email/password/token paste -->
    <div id="login-view" class="login-section" style="display: none;">
      <div class="login-icon">🔗</div>
      <div class="login-title">Connect to DevPrep</div>
      <div class="login-sub">
        Sign in to your DevPrep account to start tracking problems with spaced repetition.
      </div>
      <button class="btn" id="connect-btn">Connect to DevPrep</button>
      <div id="login-status" class="status"></div>
    </div>

    <!-- MAIN VIEW — unchanged -->
    <div id="main-view" style="display: none;">
      <div style="padding: 10px 16px; border-bottom: 1px solid #334155; text-align: right;">
        <button
          id="logout-btn"
          style="background: #334155; color: #e2e8f0; border: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;"
        >
          Logout
        </button>
      </div>

      <div class="content">
        <div id="not-leetcode" class="not-leetcode" style="display: none;">
          <p>Open a LeetCode problem page to track it.</p>
        </div>
        <div id="problem-section" style="display: none;">
          <div class="problem-info">
            <div class="problem-title" id="problem-title">Loading...</div>
            <div class="badges">
              <span class="badge badge-topic" id="problem-topic"></span>
              <span class="badge" id="problem-difficulty"></span>
            </div>
          </div>
          <div class="confidence-label">How well did you solve it?</div>
          <div class="stars">
            <div class="star" data-value="1">1</div>
            <div class="star" data-value="2">2</div>
            <div class="star" data-value="3">3</div>
            <div class="star" data-value="4">4</div>
            <div class="star" data-value="5">5</div>
          </div>
          <button class="btn" id="save-btn" disabled>Save Problem</button>
          <div id="save-status" class="status"></div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
